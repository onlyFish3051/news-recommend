{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="icon" href={% static 'photo/news_logo.png' %} type="image/x-icon" style="width: 100px;height: 100px">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href={% static 'plugins/bootstrap-4.6.2/css/bootstrap.css' %}>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
    <script src="{% static 'js/bootstrap-datepicker.zh-CN.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-4.6.2/js/bootstrap.bundle.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-4.6.2/js/bootstrap.js' %}"></script>
    <style>
        .account {
            display: inline-block;
            float: right;
            width: 330px;
            border: #dddd 1px solid;
            box-shadow: 5px 5px 20px #aaa;
            margin-right: 100px;
            margin-top: 120px;
            padding: 20px 40px;
            border-radius: 5px;
            height: 500px;

        }

        .account h2 {
            text-align: center;
            margin-top: 20px;
        }

        .leftbk {
            width: 900px;
            height: 1800px;
            background-color: #27735f;
            display: inline-block;
            float: left;
            position: fixed;
        }

        .leftbk .details {
            width: 200px;
            height: 400px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 180px;
        }

        .details .logo {
            width: 100px;
            height: 100px;
            margin-right: auto;
            margin-left: auto;
            margin-top: 40px;
        }

        .details .word {
            margin-left: auto;
            margin-right: auto;
            margin-top: 10px;

        }

        .word .p1 {
            text-align: center;
            font-size: 40px;
            color: orange;
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-weight: 600;
            font-style: normal;
        }

        .word .p2 {
            text-align: center;
            font-size: 30px;
            color: #35BDFF;
            font-family: "Ma Shan Zheng", cursive;
            font-weight: 400;
            font-style: normal;
        }

        /* 定义淡入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 应用动画到 .leftbk 元素 */
        .leftbk {
            animation: fadeIn 1s ease-in-out forwards; /* 2秒动画时长，缓动函数，保持结束状态 */
            opacity: 0; /* 初始状态设为透明 */
        }

        /* 确保在动画完成后保持不透明状态 */
        .leftbk.animated {
            opacity: 1;
        }

        .account {
            animation: fadeIn 1s ease-in-out forwards; /* 2秒动画时长，缓动函数，保持结束状态 */
            opacity: 0; /* 初始状态设为透明 */
        }

        .leftbk.account {
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="leftbk">
    <div class="details">
        <div class="logo">
            <img src="{% static 'photo/news_logo.png' %}" style="width: 100px;height: 80px">
        </div>
        <div class="word">
            <p class="p1">柿饼子头条</p>
            <p class="p2">personality&nbsp&nbsptimely&nbsp&nbsp Data visualization</p>
        </div>
    </div>
</div>
<div class="account" style="display:none;">
    <h2>用户注册</h2>
    <form method="post" id="registerForm" action="/register/">
        {% csrf_token %}
        <!-- 注册表单 -->
        <div class="form-group">
            <input style="display: inline-block" type="text" class="form-control" id="uid"
                   name="uid" placeholder="请设置您的用户账户">
        </div>
        <div class="form-group">
            <input style="display: inline-block" type="text" class="form-control" id="uname"
                   name="uname" placeholder="请设置您的用户名称">
        </div>
        <div class="form-group">
            <select class="form-control" name="sex" id="sex">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <select class="form-control" name="province" id="province">
                {% for obj in provincelist %}
                	 <option value="{{ obj.provincename }}">{{ obj.provincename }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <input type="text" class="form-control" name="birthdate" id="birthdate" placeholder="选择出生日期">
        </div>
        <div class="form-group">
            <input type="password" class="form-control" id="passwd" name="passwd"
                   placeholder="请设置您的密码">
        </div>
        <button type="submit" class="btn btn-success"
                style="float:left;width: 150px;margin-top: 20px;display: inline-block">点击注册
        </button>
    </form>
    <a href="/login/">
        <button type="submit" class="btn btn-info"
                style="float:right;width: 90px;margin-top: 20px;display: inline-block">登录界面
        </button>
    </a>

</div>
<script type="text/javascript">
    $(document).ready(function () {
        $('#birthdate').datepicker({
            language: 'zh-CN',
            format: 'yyyy-mm-dd'
        });
    })
    $(document).ready(function () {
        // 淡入第一个 div
        $('.leftbk').hide().fadeIn(1000, function () {
            // 当第一个 div 淡入完成后，淡入第二个 div
            $('.account').fadeIn(1000);
        });
    });
    $(document).ready(function () {
        $('#registerForm').on('submit', function (e) {
            e.preventDefault(); // 阻止表单默认提交行为
            var form = $(this);
            // 获取表单字段的值
            var uid = $('#uid').val();
            var uname = $('#uname').val();
            var sex = $('#sex').val();
            var passwd = $('#passwd').val();

            // 简单的前端验证，确保所有字段都不为空
            if (!uid || !uname || !sex || !passwd) {
                // 如果有字段为空，显示提示信息
                Swal.fire({
                    title: '请填写所有字段！',
                    icon: 'warning',
                    // ... 其他配置
                });
                return; // 结束函数执行
            }

            // 如果所有字段都不为空，则发送 AJAX 请求
            $.ajax({
                url: form.attr('action'), // 表单的 action 属性，即 '/register/'
                type: 'POST',
                data: form.serialize(), // 表单数据序列化
                success: function (response) {
                    if (response.registerexist) {
                        Swal.fire({
                            title: '用户账户已存在,请重新设置！',
                            icon: 'error',
                            // ... 其他配置
                        });
                    } else {
                        Swal.fire({
                            title: '创建成功！',
                            icon: 'success',
                            // ... 其他配置
                        });
                        setTimeout(function () {
                            window.location.href = '/login/';
                        }, 1000);
                    }
                },
                error: function (xhr, status, error) {
                    // 处理错误情况
                    console.error("Error: " + error.message);
                }
            });
        });
    });

</script>
</body>
</html>
