            background-color: #F8F8F8;
            float: left;
            display: inline-block;
        }

            background-color: #F8F8F8;
            width: 250px;
            height: 60px;
            padding: 8px;
            cursor: pointer;
        }

        .leftdaohang .section:hover {
            background-color: #F0F0F0;
        }

        .section:hover p,

            color: orange;
            fill: orange; /* 针对svg元素，需要使用fill属性来设置颜色 */
        }

        .leftdaohang .nstyle {
            display: inline-block;
            margin-top: 8px;

        .leftdaohang .nstyle p {

        }

        .leftdaohang .nstyle svg {

            width: 500px;
            margin-left: 50px;
            height: 200px;

        .threeoptions .threesection {
            display: inline-block;
            float: left;
            margin-left: 10px;
            margin-top: 60px;
            width: 150px;
            height: 60px;
            border: solid 1px lightgray;

            font-size: large;
            font-weight: bold;
            display: inline-block;
        }

        .content .middlesection {

            border-bottom: 1px solid lightgray;

        }

            width: 620px;
            height: 400px;
            float: left;
            margin-left: 10px;
        }

        .content .threeoptionscopy {
            display: inline-block;
            float: left;
            width: 500px;
            margin-top: -250px;
            margin-left: 50px;
            height: 200px;
        }

        .threeoptionscopy .threesection {
            display: inline-block;
            float: left;
            margin-left: 10px;
            margin-top: 60px;
            width: 150px;
            height: 60px;

            float: left;

            margin-top: 10px;

            height: 600px;

            float: left;

            height: 600px;

            background-color: #f0f0f0; /* 背景颜色 */
            color: #333; /* 文字颜色 */
            border-radius: 10px; /* 圆角 */
        }

        .my-sweetalert .swal2-icon.swal2-success {
            border-color: green; /* 成功图标边框颜色 */
        }

        .my-sweetalert .swal2-icon.swal2-success::before,
        .my-sweetalert .swal2-icon.swal2-success::after {
            background-color: green; /* 成功图标路径颜色 */
        }

        .swal2-popup .swal2-title {
            font-size: 20px !important;
        }

        #map {
            animation: fadeIn 2s ease-in-out forwards;
        }

        #threeoptions {
            animation: fadeIn 2s ease-in-out forwards;
        }

        #threeoptionscopy {
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }

                    data: [],

                    smooth: true,
                    areaStyle: {},
                    label: {
                        show: true,
                        position: 'top',
                        textStyle: {
                            fontSize: 10
                        }
                    }
                }
            ]
        };

        $.ajax({
            url: "/manage_table/",
            type: "get",
            dataType: "JSON",
            success: function (res) {
                {#将后台值传入前端#}
                if (res.status) {
                    // 转换后端数据为字符串数组

    // 为每个图片元素添加点击事件监听器
    document.querySelectorAll('.selectimg img').forEach(function (imgElement) {
        imgElement.addEventListener('click', function () {
            // 移除所有图片的选中样式
            let imgs = document.querySelectorAll('.selectimg img');
            imgs.forEach(function (img) {
                img.classList.remove('selected');
            });

            // 设置选中图片的样式，并存储URL到隐藏字段
            this.classList.add('selected');
            document.getElementById('selectedImgUrl').value = this.src;
        });
    });

                        show: false
                    },

                }
            ]
        };

            url: "/manage_table/",
            type: "get",

    {#年龄分布图#}

    function ageaccount() {
        var myChart = echarts.init(document.getElementById('sexaccount'));
        var option = {
            title: {
                text: '用户年龄分布',
            },
            tooltip: {
                trigger: 'item'
            },
            legend: {
                top: '5%',
                left: 'center'
            },
            series: [
                {
                    name: 'Access From',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        show: false,
                        position: 'center'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 40,
                            fontWeight: 'bold'
                        }
                    },
                    labelLine: {
                        show: false
                    },
                    data: []
                }
            ]
        };
        $.ajax({
                url: "/manage_table/",
                type: "get",
                dataType: "JSON",
                success: function (res) {
                    {#将后台值传入前端#}
                    if (res.status) {
                        // 从后端数据构造饼图数据
                        var pieData = res.data.agelist.map(function (item) {
                            return {
                                name: item[0],
                                value: item[1]
                            };
                        })
                        console.info(res.data.agelist)
                        // 更新图表数据
                        option.series[0].data = pieData;
                        myChart.setOption(option)
                    }
                }
            }
        )
    }
