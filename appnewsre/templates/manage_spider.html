{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户信息</title>
    <link rel="icon" href={% static 'photo/news_logo.png' %} type="image/x-icon" style="width: 100px;height: 100px">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'plugins/bootstrap-4.6.2/css/bootstrap.css' %}">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/sweetalert2@10">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-4.6.2/js/bootstrap.bundle.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-4.6.2/js/bootstrap.js' %}"></script>
    <style>
        .allpage {
            width: 1480px;
            height: 1500px;
            background-size: 1480px;
            background-repeat: no-repeat;
        }

        .head {
            width: 1480px;
            height: 80px;
            background-color: #F8F8F8;
            display: inline-block
        }

        .head .logo {
            margin-top: 15px;
            margin-left: 20px;
            width: 200px;
            height: 80px;
            font-size: 30px;
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-weight: 400;
            font-style: normal;
            float: left;
            display: inline-block;
        }


        .head a:hover {
            color: orange;
            text-decoration: none;
        }

        .logo a {
            color: black;
            text-decoration: none;
        }

        .logo a:hover {
            color: orange;
            text-decoration: none;
        }

        .head .logo a:hover {
            color: orange;
        }

        .leftdaohang {
            margin-top: -5.3px;
            height: 1800px;
            width: 250px;
            background-color: #F8F8F8;
            float: left;
            display: inline-block;
        }

        .leftdaohang .section {
            background-color: #F8F8F8;
            width: 250px;
            height: 60px;
            padding: 8px;
            cursor: pointer;
        }

        .leftdaohang .section:hover {
            background-color: #F0F0F0;
        }

        .section:hover p,
        .section:hover svg {
            color: orange;
            fill: orange; /* 针对svg元素，需要使用fill属性来设置颜色 */
        }

        .leftdaohang .nstyle {
            display: inline-block;
            margin-top: 8px;
            margin-left: 80px;
            font-size: large;
            color: black;
        }

        .leftdaohang .nstyle p {
            display: inline-block;
        }

        .leftdaohang .nstyle p:hover {
            color: orange;
        }

        .leftdaohang .nstyle svg {
            display: inline-block;
            margin-left: -5px;
        }

        .content {
            display: inline-block;
            float: left;
            width: 1100px;
            height: 1000px;
        }

        .content .userimg {
            float: left;
            display: inline-block;
            margin-left: 80px;
            margin-top: 60px;
            width: 150px;
            height: 150px;
        }

        .content .userimg img {
            width: 145px;
            height: 145px;
            border-radius: 100%;
        }

        .content .spider {
            height: 50px;
            width: 1000px;
            margin-left: 100px;
            margin-top: 50px;
        }

        .spider .newsspider {
            display: inline-block;
        }

        .content .userinfo {
            float: left;
            display: inline-block;
            margin-left: 40px;
            margin-top: 60px;
            width: 800px;
            height: 600px;
        }

        .userinfo .username {
            font-size: large;
            font-weight: bold;
        }

        .userinfo .useroinfo {
            font-size: large;
        }

        .userinfo .xiugai {
            display: inline-block;
            float: right;
            width: 100px;
            height: 100px;
            margin-top: 10px
        }

        .userimg .changeimg {
            display: inline-block;
            margin-top: 20px;
            margin-left: 24px;
        }

        .selectimg {
            padding-left: 30px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .selectimg img:hover { /* 注意这里，应该是 .selectimg img:hover 而不是 .selectimg :hover */
            border: 3px solid orange; /* 注意这里，属性值的顺序是：宽度 样式 颜色 */
            cursor: pointer;
        }

        .selectimg img:active {
            border: 3px solid orange; /* 同样，属性值的顺序是：宽度 样式 颜色 */
        }

        .selectimg img.selected {
            border: 3px solid orange;
        }

        .message {
            width: 100%;
            height: 100px;
            font-size: large;
            resize: none;
            border: lightblue 1px solid;
            background-color: white;
            display: inline-block;
            vertical-align: top;
            border-radius: 10px;
            padding: 1px;
        }

        .message:focus {
            border: orange 2px solid; /* 当textarea获得焦点时，边框颜色变为黑色 */
            padding: 2px;
            outline: none; /* 移除默认的聚焦轮廓 */
            background-color: #FAF5F9;
        }

        .my-sweetalert .swal2-popup {
            background-color: #f0f0f0; /* 背景颜色 */
            color: #333; /* 文字颜色 */
            border-radius: 10px; /* 圆角 */
        }

        .my-sweetalert .swal2-icon.swal2-success {
            border-color: green; /* 成功图标边框颜色 */
        }

        .my-sweetalert .swal2-icon.swal2-success::before,
        .my-sweetalert .swal2-icon.swal2-success::after {
            background-color: green; /* 成功图标路径颜色 */
        }

        .swal2-popup .swal2-title {
            font-size: 20px !important;
        }
    </style>
</head>
<body>
<div class="allpage">
    {#    顶部部分#}
    <div class="head">
        <div class="logo" style="width: auto">柿饼子头条管理员平台</div>
        <div style="display: inline-block;margin-top: 25px;float: right;margin-right: 10px">
            <a href="/logout/">
                <button type="button" class="btn btn-info">退出系统</button>
            </a>
        </div>
    </div>
    {#    左侧部分#}
    <div class="leftdaohang">
        <ul class="nav "> <!-- 移除了 .flex-column -->
            <li class="nav-item ">
                <a class="nav-link section" href="/manage_base/">
                    <div class="nstyle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-newspaper" viewBox="0 0 16 16" style="margin-bottom: 3px">
                            <path d="M7.996 0A7.998 7.998 0 0 0 0 8a8 8 0 0 0 6.93 7.93v-1.613a1.06 1.06 0 0 0-.717-1.008A5.602 5.602 0 0 1 2.4 7.865 5.579 5.579 0 0 1 8.054 2.4a5.599 5.599 0 0 1 5.535 5.81l-.002.046a6.116 6.116 0 0 1-.012.192l-.005.061a4.85 4.85 0 0 1-.033.284l-.01.068c-.685 4.516-6.564 7.054-6.596 7.068A7.998 7.998 0 0 0 15.992 8 7.998 7.998 0 0 0 7.996.001Z"/>
                        </svg>
                        <p>后台首页</p>
                    </div>
                </a>
            </li>
            <li class="nav-item ">
                <a class="nav-link section" href="/manage_info/">
                    <div class="nstyle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-newspaper" viewBox="0 0 16 16" style="margin-bottom: 3px">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
                        </svg>
                        </svg>
                        <p>个人信息</p>
                    </div>
                </a>
            </li>
            <li class="nav-item ">
                <a class="nav-link section" href="/manage_user/">
                    <div class="nstyle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-clock-history" viewBox="0 0 16 16" style="margin-bottom: 3px">
                            <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002a.274.274 0 0 1-.014.002H7.022zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816zM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275zM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
                        </svg>
                        <p>用户管理</p>
                    </div>
                </a>
            </li>
            <li class="nav-item ">
                <a class="nav-link section" href="/manage_news/">
                    <div class="nstyle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-clock-history" viewBox="0 0 16 16" style="margin-bottom: 3px">
                            <path d="M0 2.5A1.5 1.5 0 0 1 1.5 1h11A1.5 1.5 0 0 1 14 2.5v10.528c0 .3-.05.654-.238.972h.738a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 1 1 0v9a1.5 1.5 0 0 1-1.5 1.5H1.497A1.497 1.497 0 0 1 0 13.5v-11zM12 14c.37 0 .654-.211.853-.441.092-.106.147-.279.147-.531V2.5a.5.5 0 0 0-.5-.5h-11a.5.5 0 0 0-.5.5v11c0 .278.223.5.497.5H12z"/>
                            <path d="M2 3h10v2H2V3zm0 3h4v3H2V6zm0 4h4v1H2v-1zm0 2h4v1H2v-1zm5-6h2v1H7V6zm3 0h2v1h-2V6zM7 8h2v1H7V8zm3 0h2v1h-2V8zm-3 2h2v1H7v-1zm3 0h2v1h-2v-1zm-3 2h2v1H7v-1zm3 0h2v1h-2v-1z"/>
                        </svg>
                        <p>新闻管理</p>
                    </div>
                </a>
            </li>
            <li class="nav-item ">
                <a class="nav-link section" href="/manage_spider/">
                    <div class="nstyle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-clock-history" viewBox="0 0 16 16" style="margin-bottom: 3px;color: orange">
                            <path d="M4.355.522a.5.5 0 0 1 .623.333l.291.956A4.979 4.979 0 0 1 8 1c1.007 0 1.946.298 2.731.811l.29-.956a.5.5 0 1 1 .957.29l-.41 1.352A4.985 4.985 0 0 1 13 6h.5a.5.5 0 0 0 .5-.5V5a.5.5 0 0 1 1 0v.5A1.5 1.5 0 0 1 13.5 7H13v1h1.5a.5.5 0 0 1 0 1H13v1h.5a1.5 1.5 0 0 1 1.5 1.5v.5a.5.5 0 1 1-1 0v-.5a.5.5 0 0 0-.5-.5H13a5 5 0 0 1-10 0h-.5a.5.5 0 0 0-.5.5v.5a.5.5 0 1 1-1 0v-.5A1.5 1.5 0 0 1 2.5 10H3V9H1.5a.5.5 0 0 1 0-1H3V7h-.5A1.5 1.5 0 0 1 1 5.5V5a.5.5 0 0 1 1 0v.5a.5.5 0 0 0 .5.5H3c0-1.364.547-2.601 1.432-3.503l-.41-1.352a.5.5 0 0 1 .333-.623zM4 7v4a4 4 0 0 0 3.5 3.97V7H4zm4.5 0v7.97A4 4 0 0 0 12 11V7H8.5zM12 6a3.989 3.989 0 0 0-1.334-2.982A3.983 3.983 0 0 0 8 2a3.983 3.983 0 0 0-2.667 1.018A3.989 3.989 0 0 0 4 6h8z"/>
                        </svg>
                        <p style="color: orange">新闻爬取</p>
                    </div>
                </a>
            </li>
        </ul>
    </div>
    {#内容部分#}
    <div class="content">
        <div class="spider">
            <form method="post" action="/spider/" id="spiderform">
                {% csrf_token %}
                <div style="display: inline-block">
                    <label for="type">爬取新闻类别(PS:一次爬取10条该类别的新闻)</label>
                    <select id="inputState" class="form-control" name="cname">
                        {% for obj in typelist %}
                            <option value="{{ obj.cname }}" data-cid="{{ obj.cid }}">{{ obj.cname }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="btn btn-outline-secondary searchlogo" type="submit" id="button-addon2"
                        style="color: black;border: 0px;margin-bottom: 3px">
                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                         class="bi bi-search-heart" style="float: left" viewBox="0 0 16 16">
                        <path d="M4.355.522a.5.5 0 0 1 .623.333l.291.956A4.979 4.979 0 0 1 8 1c1.007 0 1.946.298 2.731.811l.29-.956a.5.5 0 1 1 .957.29l-.41 1.352A4.985 4.985 0 0 1 13 6h.5a.5.5 0 0 0 .5-.5V5a.5.5 0 0 1 1 0v.5A1.5 1.5 0 0 1 13.5 7H13v1h1.5a.5.5 0 0 1 0 1H13v1h.5a1.5 1.5 0 0 1 1.5 1.5v.5a.5.5 0 1 1-1 0v-.5a.5.5 0 0 0-.5-.5H13a5 5 0 0 1-10 0h-.5a.5.5 0 0 0-.5.5v.5a.5.5 0 1 1-1 0v-.5A1.5 1.5 0 0 1 2.5 10H3V9H1.5a.5.5 0 0 1 0-1H3V7h-.5A1.5 1.5 0 0 1 1 5.5V5a.5.5 0 0 1 1 0v.5a.5.5 0 0 0 .5.5H3c0-1.364.547-2.601 1.432-3.503l-.41-1.352a.5.5 0 0 1 .333-.623zM4 7v4a4 4 0 0 0 3.5 3.97V7H4zm4.5 0v7.97A4 4 0 0 0 12 11V7H8.5zM12 6a3.989 3.989 0 0 0-1.334-2.982A3.983 3.983 0 0 0 8 2a3.983 3.983 0 0 0-2.667 1.018A3.989 3.989 0 0 0 4 6h8z"/>
                    </svg>
                </button>
            </form>
            {#        爬取某一个具体新闻的功能#}
            <form style="margin-top: 20px;width: 1000px" method="post" id="despiderform" action="/despider/">
                {% csrf_token %}
                <div style="display: inline-block">
                    <label for="type" style="display: block">爬取某一具体新闻</label>
                    <select id="inputState" class="form-control" name="cname" style="width: 100px;display: inline-block">
                        {% for obj in typelist %}
                            <option value="{{ obj.cname }}" data-cid="{{ obj.cid }}">{{ obj.cname }}</option>
                        {% endfor %}
                    </select>
                    &nbsp&nbsp&nbsp&nbsp该新闻的URL:<input class="form-control" id="url" style="width: 400px;display: inline-block" name="url">
                </div>
                <button class="btn btn-outline-secondary searchlogo" type="submit" id="button-addon2"
                        style="color: black;border: 0px;margin-bottom: 3px">
                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                         class="bi bi-search-heart" style="float: left" viewBox="0 0 16 16">
                        <path d="M4.355.522a.5.5 0 0 1 .623.333l.291.956A4.979 4.979 0 0 1 8 1c1.007 0 1.946.298 2.731.811l.29-.956a.5.5 0 1 1 .957.29l-.41 1.352A4.985 4.985 0 0 1 13 6h.5a.5.5 0 0 0 .5-.5V5a.5.5 0 0 1 1 0v.5A1.5 1.5 0 0 1 13.5 7H13v1h1.5a.5.5 0 0 1 0 1H13v1h.5a1.5 1.5 0 0 1 1.5 1.5v.5a.5.5 0 1 1-1 0v-.5a.5.5 0 0 0-.5-.5H13a5 5 0 0 1-10 0h-.5a.5.5 0 0 0-.5.5v.5a.5.5 0 1 1-1 0v-.5A1.5 1.5 0 0 1 2.5 10H3V9H1.5a.5.5 0 0 1 0-1H3V7h-.5A1.5 1.5 0 0 1 1 5.5V5a.5.5 0 0 1 1 0v.5a.5.5 0 0 0 .5.5H3c0-1.364.547-2.601 1.432-3.503l-.41-1.352a.5.5 0 0 1 .333-.623zM4 7v4a4 4 0 0 0 3.5 3.97V7H4zm4.5 0v7.97A4 4 0 0 0 12 11V7H8.5zM12 6a3.989 3.989 0 0 0-1.334-2.982A3.983 3.983 0 0 0 8 2a3.983 3.983 0 0 0-2.667 1.018A3.989 3.989 0 0 0 4 6h8z"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <!-- 加载模态框 -->
    <div class="modal fade" id="loadingModal" tabindex="-1" role="dialog" aria-labelledby="loadingModalLabel"
         aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="text-center">
                        正在爬取,请耐心等待
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {
        $('#spiderform').on('submit', function (e) {
            e.preventDefault();  // 阻止默认的表单提交行为
            // 显示加载模态框
            $('#loadingModal').modal('show');
            var form = $(this);
            var cname = form.find('#inputState').val(); // 获取选中的cname值
            var cid = form.find('#inputState option:selected').data('cid'); // 获取选中的option的data-cid值
            var csrftoken = $('input[name=csrfmiddlewaretoken]').val();
            // 禁用页面上的其他交互（可选）
            $('body').addClass('modal-open'); // Bootstrap的modal-open类会使body具有overflow:hidden样式
            $('body').css('position', 'fixed'); // 防止滚动
            $('body').css('width', '100%'); // 防止滚动
            $.ajax({
                type: "POST",
                url: form.attr('action'),
                headers: {'X-CSRFToken': csrftoken},
                data: {
                    cname: cname, // 发送cname值到后端
                    cid: cid // 发送data-cid值到后端
                }, // 序列化表单数据
                success: function (response) {
                    // 隐藏加载模态框
                    $('#loadingModal').modal('hide');

                    // 启用页面上的其他交互
                    $('body').removeClass('modal-open');
                    $('body').css('position', '');
                    $('body').css('width', '');
                    if (response.success) {
                        // 如果爬取成功，则显示成功提示，并重定向到 /manage_spider/
                        Swal.fire({
                            icon: 'success',
                            title: '爬取成功',
                            text: response.message,
                            confirmButtonText: '确定'
                        }).then(function () {
                            window.location.href = '/manage_spider/';
                        });
                    } else {
                        // 如果爬取失败，则显示失败提示
                        Swal.fire({
                            icon: 'error',
                            title: '爬取失败',
                            text: response.message,
                            confirmButtonText: '确定'
                        });
                    }
                }
            });
        });
    });
    $(document).ready(function () {
        $('#despiderform').on('submit', function (e) {
            e.preventDefault();  // 阻止默认的表单提交行为
            // 显示加载模态框
            $('#loadingModal').modal('show');
            var form = $(this);
            var url = form.find('input[name="url"]').val();
            var cname = form.find('#inputState').val(); // 获取选中的cname值
            var cid = form.find('#inputState option:selected').data('cid'); // 获取选中的option的data-cid值
            var csrftoken = $('input[name=csrfmiddlewaretoken]').val();
            // 禁用页面上的其他交互（可选）
            $('body').addClass('modal-open'); // Bootstrap的modal-open类会使body具有overflow:hidden样式
            $('body').css('position', 'fixed'); // 防止滚动
            $('body').css('width', '100%'); // 防止滚动
            $.ajax({
                type: "POST",
                url: form.attr('action'),
                headers: {'X-CSRFToken': csrftoken},
                data: {
                    url: url,
                    cname: cname, // 发送cname值到后端
                    cid: cid // 发送data-cid值到后端
                }, // 序列化表单数据
                success: function (response) {
                    // 隐藏加载模态框
                    $('#loadingModal').modal('hide');

                    // 启用页面上的其他交互
                    $('body').removeClass('modal-open');
                    $('body').css('position', '');
                    $('body').css('width', '');
                    if (response.success) {
                        // 如果爬取成功，则显示成功提示，并重定向到 /manage_spider/
                        Swal.fire({
                            icon: 'success',
                            title: '爬取成功',
                            text: response.message,
                            confirmButtonText: '确定'
                        }).then(function () {
                            window.location.href = '/manage_spider/';
                        });
                    } else {
                        // 如果爬取失败，则显示失败提示
                        Swal.fire({
                            icon: 'error',
                            title: '爬取失败',
                            text: response.message,
                            confirmButtonText: '确定'
                        });
                    }
                }
            });
        });
    });
</script>
</body>
</html>
